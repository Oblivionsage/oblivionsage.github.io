{{ define "main" }}
<div class="container">
    <article class="post">
        <header class="post-header">
            <h1>{{ .Title }}</h1>
            <time>{{ .Date.Format "January 2, 2006" }}</time>
            {{ if .Params.tags }}
            <div class="tags">
                {{ range .Params.tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
            </div>
            {{ end }}
        </header>
        
        <div class="post-content">
            {{ .Content }}
        </div>
    </article>
</div>
{{ end }}
