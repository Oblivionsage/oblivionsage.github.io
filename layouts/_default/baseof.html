<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ .Site.Params.description }}">
    <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">{{ .Site.Title }}</a>
            <div class="nav-links">
                <a href="/posts">Posts</a>
                <a href="/about">About</a>
            </div>
        </nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <p class="footer-copyright">&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
        <div class="footer-social">
            <a href="https://github.com/oblivionsage" target="_blank" title="GitHub">
                <img src="https://cdn.simpleicons.org/github/c9d1d9" alt="GitHub">
            </a>
            <a href="https://twitter.com/theoblivionsage" target="_blank" title="Twitter">
                <img src="https://cdn.simpleicons.org/x/c9d1d9" alt="Twitter">
            </a>
            <a href="https://linkedin.com/in/haliloktay" target="_blank" title="LinkedIn">
                <img src="https://unpkg.com/boxicons@2.1.4/svg/logos/bxl-linkedin.svg" alt="LinkedIn">
            </a>
        </div>
    </footer>
</body>
</html>
